name: Generate Daily News

on:
  schedule:
    # 09:15 Asia/Shanghai = 01:15 UTC.
    # Avoid the top-of-hour GitHub Actions cron rush, where scheduled
    # workflows can be delayed or occasionally dropped.
    - cron: "15 1 * * *"
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Use GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Generate Horizon news
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: uv run horizon --hours 24

      - name: Export Cloudflare Pages static site
        run: uv run python -m src.web.static_export

      - name: Commit generated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/issues data/media data/summaries docs/_posts public
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "chore: generate daily news"
          git push
