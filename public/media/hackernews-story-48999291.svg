<svg aria-labelledby="title desc" role="img" viewBox="0 0 2048 1152" height="1152" width="2048" xmlns="http://www.w3.org/2000/svg">
  <title>Beyond Single Models: Why Routing Kimi K3 and Fable Outperforms the Rest</title>
  <desc id="desc">Three line charts compare Kimi K3, Routing, and Fable 5 across SWE, Terminal, and Algorithmic benchmarks.</desc>
  <defs>
    <style>
      .sans { font-family: Inter, "Helvetica Neue", Arial, sans-serif; }
      .headline { font-size: 62px; font-weight: 750; letter-spacing: -1.2px; fill: #000; }
      .chart-title { font-size: 36px; font-weight: 700; fill: #090909; }
      .axis-label { font-size: 27px; font-weight: 400; fill: #111; }
      .legend-label { font-size: 35px; font-weight: 650; fill: #080808; }
      .wordmark { font-size: 50px; font-weight: 400; letter-spacing: -1px; fill: #080808; }
      .grid { stroke: #f4f6fc; stroke-width: 3; }
      .axis { stroke: #6a6a6a; stroke-width: 4; }
      .route-line { fill: none; stroke: #bdbdbd; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect fill="#fff" height="1152" width="2048"></rect>

  
  <text y="257" x="214" class="sans headline">Beyond Single Models: Why Routing Kimi K3</text>
  <text y="328" x="214" class="sans headline">and Fable Outperforms the Rest</text>

  
  <text text-anchor="middle" y="480" x="482" class="sans chart-title">SWE</text>
  <text text-anchor="middle" y="480" x="1111" class="sans chart-title">Terminal</text>
  <text text-anchor="middle" y="480" x="1720" class="sans chart-title">Algorithmic</text>

  
  <g aria-label="SWE chart">
    <line y2="513" x2="706" y1="513" x1="264" class="grid"></line>
    <line y2="630" x2="706" y1="630" x1="264" class="grid"></line>
    <line y2="752" x2="706" y1="752" x1="264" class="grid"></line>
    <line y2="755" x2="264" y1="513" x1="264" class="axis"></line>
    <line y2="755" x2="706" y1="755" x1="264" class="axis"></line>
    <text text-anchor="end" y="522" x="245" class="sans axis-label">100%</text>
    <text text-anchor="end" y="639" x="245" class="sans axis-label">94%</text>
    <text text-anchor="end" y="761" x="245" class="sans axis-label">88%</text>
    <text text-anchor="middle" y="796" x="375" class="sans axis-label">$0.500</text>
    <text text-anchor="middle" y="796" x="610" class="sans axis-label">$0.800</text>
    <polyline points="393,667 372,602 608,659" class="route-line"></polyline>
    <circle fill="#7073E9" r="12" cy="667" cx="393"></circle>
    <circle fill="#08BA4F" r="12" cy="602" cx="372"></circle>
    <circle fill="#FF3F3F" r="12" cy="659" cx="608"></circle>
  </g>

  
  <g aria-label="Terminal chart">
    <line y2="513" x2="1327" y1="513" x1="884" class="grid"></line>
    <line y2="630" x2="1327" y1="630" x1="884" class="grid"></line>
    <line y2="752" x2="1327" y1="752" x1="884" class="grid"></line>
    <line y2="755" x2="884" y1="513" x1="884" class="axis"></line>
    <line y2="755" x2="1327" y1="755" x1="884" class="axis"></line>
    <text text-anchor="end" y="522" x="866" class="sans axis-label">92%</text>
    <text text-anchor="end" y="639" x="866" class="sans axis-label">82%</text>
    <text text-anchor="end" y="761" x="866" class="sans axis-label">72%</text>
    <text text-anchor="middle" y="796" x="988" class="sans axis-label">$0.341</text>
    <text text-anchor="middle" y="796" x="1259" class="sans axis-label">$17</text>
    <polyline points="988,644 1055,553 1249,694" class="route-line"></polyline>
    <circle fill="#7073E9" r="12" cy="644" cx="988"></circle>
    <circle fill="#08BA4F" r="12" cy="553" cx="1055"></circle>
    <circle fill="#FF3F3F" r="12" cy="694" cx="1249"></circle>
  </g>

  
  <g aria-label="Algorithmic chart">
    <line y2="513" x2="1945" y1="513" x1="1503" class="grid"></line>
    <line y2="630" x2="1945" y1="630" x1="1503" class="grid"></line>
    <line y2="752" x2="1945" y1="752" x1="1503" class="grid"></line>
    <line y2="755" x2="1503" y1="513" x1="1503" class="axis"></line>
    <line y2="755" x2="1945" y1="755" x1="1503" class="axis"></line>
    <text text-anchor="end" y="522" x="1484" class="sans axis-label">96%</text>
    <text text-anchor="end" y="639" x="1484" class="sans axis-label">90%</text>
    <text text-anchor="end" y="761" x="1484" class="sans axis-label">84%</text>
    <text text-anchor="middle" y="796" x="1617" class="sans axis-label">$0.064</text>
    <text text-anchor="middle" y="796" x="1849" class="sans axis-label">$0.224</text>
    <polyline points="1609,669 1675,592 1849,605" class="route-line"></polyline>
    <circle fill="#7073E9" r="12" cy="669" cx="1609"></circle>
    <circle fill="#08BA4F" r="12" cy="592" cx="1675"></circle>
    <circle fill="#FF3F3F" r="12" cy="605" cx="1849"></circle>
  </g>

  
  <g aria-label="Legend">
    <rect fill="#7073E9" height="31" width="31" y="1045" x="207"></rect>
    <text y="1076" x="258" class="sans legend-label">Kimi K3</text>
    <rect fill="#08BA4F" height="31" width="31" y="1045" x="455"></rect>
    <text y="1076" x="506" class="sans legend-label">Routing</text>
    <rect fill="#FF3F3F" height="31" width="31" y="1045" x="699"></rect>
    <text y="1076" x="750" class="sans legend-label">Fable 5</text>
  </g>

  
  <g aria-label="Fireworks logo">
    <g stroke-linejoin="round" stroke-linecap="square" stroke-width="7" stroke="#6720FF" fill="none">
      <path d="M1630 1048 L1649 1073 L1620 1073"></path>
      <path d="M1650 1035 L1668 1065 L1684 1035"></path>
      <path d="M1698 1048 L1681 1073 L1710 1073"></path>
    </g>
    <text y="1077" x="1722" class="sans wordmark">Fireworks</text>
  </g>
</svg>
