<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon 后台</title>
  <link rel="stylesheet" href="/static/styles.css?v=3" />
  <style>
    .admin-wrap { max-width: 760px; margin: 0 auto; padding: 40px clamp(16px, 4vw, 32px) 80px; }
    .admin-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .admin-head h1 { font-size: 22px; margin: 0; }
    .admin-head a { color: var(--text-faint); text-decoration: none; font-size: 13px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 20px; }
    .panel h2 { font-size: 15px; margin: 0 0 16px; color: var(--accent-3); letter-spacing: 0.5px; text-transform: uppercase; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; background: var(--panel-solid); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none;
    }
    .field .hint { font-size: 12px; color: var(--text-faint); margin-top: 5px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .check { display: flex; align-items: center; gap: 8px; }
    .check input { width: auto; }
    .btn {
      border: 0; cursor: pointer; border-radius: 10px; padding: 11px 20px; font-size: 14px; font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: var(--panel-solid); border: 1px solid var(--border-strong); color: var(--text); }
    .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
    .msg.ok { color: var(--good); }
    .msg.err { color: #f87171; }
    .login-box { max-width: 380px; margin: 60px auto; }
    .run-status { font-size: 13px; color: var(--text-dim); white-space: pre-wrap; margin-top: 10px; }
    #app[hidden], #login[hidden] { display: none; }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <!-- Login -->
  <section id="login" class="admin-wrap">
    <div class="panel login-box">
      <h2>Horizon 后台登录</h2>
      <div class="field">
        <label for="pw">管理员密码</label>
        <input type="password" id="pw" placeholder="ADMIN_PASSWORD" />
      </div>
      <div class="actions">
        <button class="btn" id="loginBtn">登录</button>
      </div>
      <div class="msg" id="loginMsg"></div>
    </div>
  </section>

  <!-- Admin app -->
  <section id="app" class="admin-wrap" hidden>
    <div class="admin-head">
      <h1>Horizon 后台管理</h1>
      <div class="actions">
        <a href="/">← 返回网站</a>
        <button class="btn-ghost btn" id="logoutBtn">退出</button>
      </div>
    </div>

    <div class="panel">
      <h2>生成控制</h2>
      <div class="actions">
        <button class="btn" id="runBtn">立即生成一期</button>
        <button class="btn-ghost btn" id="refreshBtn">刷新状态</button>
      </div>
      <div class="run-status" id="runStatus"></div>
    </div>

    <div class="panel">
      <h2>定时生成</h2>
      <div class="field check">
        <input type="checkbox" id="schedEnabled" />
        <label for="schedEnabled" style="margin:0;">启用每日自动生成</label>
      </div>
      <div class="row">
        <div class="field">
          <label>生成时间（24 小时制，可多个用逗号分隔）</label>
          <input type="text" id="schedTimes" placeholder="09:00, 18:00" />
        </div>
        <div class="field">
          <label>时区</label>
          <input type="text" id="schedTz" placeholder="Asia/Shanghai" />
        </div>
      </div>
      <div class="hint">修改后保存即生效，无需重启服务。</div>
    </div>

    <div class="panel">
      <h2>AI 接口</h2>
      <div class="row">
        <div class="field">
          <label>Provider</label>
          <select id="aiProvider">
            <option value="ali">ali（阿里云通义）</option>
            <option value="openai">openai</option>
            <option value="anthropic">anthropic</option>
            <option value="deepseek">deepseek</option>
            <option value="gemini">gemini</option>
            <option value="doubao">doubao</option>
            <option value="minimax">minimax</option>
            <option value="azure">azure</option>
            <option value="ollama">ollama</option>
          </select>
        </div>
        <div class="field">
          <label>模型 Model</label>
          <input type="text" id="aiModel" placeholder="qwen-plus" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>API Key 环境变量名</label>
          <input type="text" id="aiKeyEnv" placeholder="DASHSCOPE_API_KEY" />
        </div>
        <div class="field">
          <label>API Key（留空则不修改）</label>
          <input type="password" id="aiKey" placeholder="********" autocomplete="off" />
          <div class="hint" id="aiKeyHint"></div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Temperature</label>
          <input type="number" step="0.1" id="aiTemp" />
        </div>
        <div class="field">
          <label>Max tokens</label>
          <input type="number" id="aiMaxTokens" />
        </div>
      </div>
      <div class="field">
        <label>输出语言（逗号分隔，如 en,zh）</label>
        <input type="text" id="aiLangs" placeholder="en, zh" />
      </div>
    </div>

    <div class="panel">
      <h2>筛选</h2>
      <div class="row">
        <div class="field">
          <label>AI 评分阈值</label>
          <input type="number" step="0.5" id="fltThreshold" />
        </div>
        <div class="field">
          <label>每期最多文章数（留空不限）</label>
          <input type="number" id="fltMaxItems" />
        </div>
      </div>
      <div class="field">
        <label>抓取时间窗口（小时）</label>
        <input type="number" id="fltWindow" />
      </div>
    </div>

    <div class="panel">
      <h2>配图</h2>
      <div class="field check">
        <input type="checkbox" id="imgEnabled" />
        <label for="imgEnabled" style="margin:0;">为每篇文章自动搜索网络配图</label>
      </div>
      <div class="field">
        <label>每篇候选图片数量</label>
        <input type="number" id="imgMax" />
      </div>
    </div>

    <div class="panel">
      <h2>站点信息</h2>
      <div class="row">
        <div class="field">
          <label>中文标题</label>
          <input type="text" id="siteTitleZh" />
        </div>
        <div class="field">
          <label>英文标题</label>
          <input type="text" id="siteTitleEn" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>中文简介</label>
          <input type="text" id="siteDescZh" />
        </div>
        <div class="field">
          <label>英文简介</label>
          <input type="text" id="siteDescEn" />
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="saveBtn">保存全部设置</button>
    </div>
    <div class="msg" id="saveMsg"></div>
  </section>

  <script src="/static/admin.js?v=2"></script>
</body>
</html>
