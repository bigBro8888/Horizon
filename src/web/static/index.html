<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/static/styles.css?v=15" />
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand" id="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name" id="siteTitle">Horizon</span>
    </div>
    <nav class="topnav">
      <div class="lang-toggle" role="group" aria-label="language">
        <button class="lang-btn" data-lang="zh" id="langZh">中文</button>
        <button class="lang-btn" data-lang="en" id="langEn">EN</button>
      </div>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero-left">
        <p class="hero-kicker" id="heroKicker">AI 自动生成 · 每日科技前沿</p>
        <h1 class="hero-title" id="heroTitle">Horizon</h1>
        <p class="hero-meta" id="heroMeta"></p>
        <div class="filter-nav" id="filterNav" hidden>
          <button class="filter-chip active" id="sortLatest" type="button">最新</button>
          <button class="date-filter" id="datePickerBtn" type="button">
            <span id="filterDateLabel">日期</span>
            <strong id="filterDateText">全部日期</strong>
          </button>
          <input class="native-date-input" type="date" id="filterDate" tabindex="-1" aria-hidden="true" />
          <button class="filter-chip" id="filterToday" type="button">今日</button>
          <label class="search-box">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input type="search" id="searchInput" placeholder="搜索标题、摘要、标签" />
          </label>
        </div>
      </div>
    </section>

    <section id="feed" class="feed"></section>
    <nav class="pager" id="pager" hidden>
      <button class="pager-btn" id="prevPage" type="button">上一页</button>
      <span class="pager-info" id="pagerInfo"></span>
      <button class="pager-btn" id="nextPage" type="button">下一页</button>
    </nav>

    <div id="emptyState" class="empty" hidden>
      <div class="empty-icon">🛰️</div>
      <p id="emptyText">暂无内容，系统会在下次定时任务后自动生成。</p>
    </div>
  </main>

  <footer class="footer">
    <span id="footerText">Horizon · AI 驱动的科技新闻</span>
    <a href="/admin" id="adminLink" class="admin-link">后台</a>
  </footer>

  <!-- Article reader overlay -->
  <div id="reader" class="reader" hidden>
    <div class="reader-backdrop" data-close="reader"></div>
    <article class="reader-panel">
      <button class="reader-close" data-close="reader" aria-label="close">✕</button>
      <div class="reader-scroll">
        <div class="reader-cover" id="readerCover"></div>
        <div class="reader-body-wrap">
          <div class="reader-tags" id="readerTags"></div>
          <h1 class="reader-title" id="readerTitle"></h1>
          <div class="reader-sub" id="readerSub"></div>
          <div class="reader-content" id="readerContent"></div>
          <div class="reader-extra" id="readerExtra"></div>
          <div class="reader-sources" id="readerSources"></div>
        </div>
      </div>
    </article>
  </div>

  <script src="/static/app.js?v=15"></script>
</body>
</html>
